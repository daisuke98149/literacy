<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>表の作成</title>

    <style>
        table {
            border-collapse: collapse;
            width: 400px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: lightgray;
        }
    </style>
</head>

<body>

<h1>自己紹介表</h1>

<table>
    <tr>
        <th>項目</th>
        <th>内容</th>
    </tr>

    <tr>
        <td>名前</td>
        <td>石野大輔</td>
    </tr>

    <tr>
        <td>趣味</td>
        <td>ゲーム</td>
    </tr>

    <tr>
        <td>好きな食べ物</td>
        <td>ラーメン</td>
    </tr>
</table>

</body>
</html>
